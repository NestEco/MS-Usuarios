server.port=8085
spring.application.name=microservicio-usuarios

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/arcadia_usuarios?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (usando un valor por defecto para local)
jwt.secret=${JWT_SECRET:QXJjYWRpYVN1cGVyU2VjcmV0S2V5MTIzNDU2Nzg5MCFBcmNhZGlhU2VjcmV0}
jwt.expiration-ms=86400000

# Logs
logging.level.org.springframework.web=INFO
logging.level.com.arcadia.usuarios=INFO
logging.level.org.springframework.security=WARN
